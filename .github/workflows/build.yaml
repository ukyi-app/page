name: build
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76
        with:
          bun-version: 1.3.10
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run test:unit
  integration:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76
        with:
          bun-version: 1.3.10
      - run: bun install --frozen-lockfile
      - run: docker compose -f docker-compose.test.yaml up -d
      - run: |
          for i in $(seq 1 30); do
            if docker compose -f docker-compose.test.yaml exec -T postgres pg_isready -U page_migrator -d page_test; then
              exit 0
            fi
            sleep 2
          done
          docker compose -f docker-compose.test.yaml logs postgres
          exit 1
      - run: ALLOW_TEST_DB_RESET=1 bun run test:integration
      - if: always()
        run: docker compose -f docker-compose.test.yaml down -v
  image:
    if: github.event_name == 'push'
    needs: [test, integration]
    permissions:
      contents: read
      packages: write
    uses: ukyi-app/homelab/.github/workflows/reusable-app-build.yaml@ffa0a6adb2a13cb750b778171538788b5800c5ec
    with:
      app: ${{ github.event.repository.name }}
