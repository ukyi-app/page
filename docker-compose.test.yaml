name: page

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: page_migrator
      POSTGRES_PASSWORD: migrator
      POSTGRES_DB: page_test
    ports:
      - "15432:5432"
    volumes:
      - ./tests/integration/init-test-db.sql:/docker-entrypoint-initdb.d/001-init-test-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U page_migrator -d page_test"]
      interval: 2s
      timeout: 2s
      retries: 30
